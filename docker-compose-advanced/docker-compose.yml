services:
  db:
    image: postgres:15
    restart: always
    init: true
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 2s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: always
    init: true
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: secret
    ports:
      - "5002:5000"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  web:
    image: nginx:alpine
    depends_on:
      - api
    restart: always
    init: true
    ports:
      - "8080:80"
    volumes:
      - ./www:/usr/share/nginx/html:ro

  worker:
    image: python:3.12-slim
    profiles:
      - worker
    command: ["sh", "-c", "echo worker running; sleep 3600"]
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dbdata:
